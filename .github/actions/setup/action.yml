name: Setup
description: Install pnpm, setup Node with pnpm cache, install dependencies. Caller must run actions/checkout first.
runs:
  using: composite
  steps:
    # pnpm version is read from package.json packageManager field.
    - name: Install pnpm
      uses: pnpm/action-setup@a15d269cd4658e1107c09f1fabf4cbd7bd1f308a # v4.4.0

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version-file: .tool-versions
        cache: pnpm

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
      shell: bash
