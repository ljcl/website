version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Australia/Melbourne
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    reviewers:
      - ljcl

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Australia/Melbourne
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
    reviewers:
      - ljcl
