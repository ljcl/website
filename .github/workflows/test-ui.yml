name: UI Tests

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - uses: actions/checkout@v5

      - uses: ./.github/actions/setup

      - name: Get Playwright version
        id: playwright-version
        run: |
          version=$(pnpm ls playwright --depth=0 --json | jq -r '.[0].devDependencies.playwright.version // .[0].dependencies.playwright.version')
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            version=$(pnpm exec playwright --version | awk '{print $2}')
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Playwright version: $version"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Install system deps only (cache hit path)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm exec playwright install-deps chromium

      - name: Run tests
        run: pnpm run test-storybook

      - name: Notify Vercel
        if: github.event_name == 'pull_request'
        uses: vercel/repository-dispatch/actions/status@30f760c6640485cd92f8c785ef361382555fb712 # v1
        with:
          name: "Vercel - personal-site: Components"
